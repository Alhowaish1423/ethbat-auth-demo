{% extends "base.html" %}

{% block title %}Success — Ethbat Auth Demo{% endblock %}
{% block heading %}Login Successful ✅{% endblock %}

{% block content %}
  <div class="success-banner">
    <p>Welcome, <strong>{{ username }}</strong>!</p>
    <p>Authenticated via <strong>{{ auth_method }}</strong>.</p>
    <p>Login time: <strong id="login-time">—</strong></p>
  </div>
  <a href="{{ url_for('logout') }}" class="btn btn--danger btn--full">Logout</a>

  <script>
    const startMs = sessionStorage.getItem('login_start_ms');
    if (startMs) {
      const elapsed = ((Date.now() - parseInt(startMs)) / 1000).toFixed(2);
      document.getElementById('login-time').textContent = elapsed + ' seconds';
      sessionStorage.removeItem('login_start_ms');
    }
  </script>
{% endblock %}
